<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero CV Button</title>
  <style>
    :root {
      --hero-accent: #ff6b6b; /* main button color */
      --hero-accent-hover: #ff4b4b; /* hover color */
      --hero-button-text: #ffffff;
      --hero-bg: #f5f5f5; /* page background */
      --hero-text: #333333;
    }

    /* Basic Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: var(--hero-bg);
      color: var(--hero-text);
    }

    /* Hero Section */
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      max-width: 600px;
    }

    .buttons button {
    padding: 12px 24px;
    border: 2px solid var(--hero-accent);
    background: transparent;
    cursor: pointer;
    border-radius: 30px;
    font-weight: 600;
    transition: transform 0.3s ease, background 0.3s, box-shadow 0.3s;
    animation: slideX 1.2s ease-in-out infinite alternate; /* horizontal animation */
    color: var(--hero-accent);
}

.buttons button.active,
.buttons button:hover {
    background: var(--hero-accent);
    color: var(--hero-button-text);
}

#heroCvBtn {
    background: var(--hero-accent);
    color: var(--hero-button-text);
    border: none;
    padding: 12px 28px;
    cursor: pointer;
    border-radius: 30px;
    font-weight: 600;
    margin-top: 10px;
    width: fit-content;
    transition: transform 0.4s ease-in-out, background 0.3s;
    animation: floatY 1.2s ease-in-out infinite alternate; /* vertical animation */
}

/* Horizontal sliding animation */
@keyframes slideX {
    0% { transform: translateX(0); }
    100% { transform: translateX(12px); }
}

/* Vertical floating animation */
@keyframes floatY {
    0% { transform: translateY(0); }
    100% { transform: translateY(-8px); }
}
  </style>
</head>
<body>

  <section class="hero">
    <h1>Hello, I'm Kh P</h1>
    <p>Welcome to my personal website! You can download my CV below to know more about my work and experience.</p>
    <a href="your-cv.pdf" download>
      <button id="heroCvBtn">Download CV</button>
    </a>
  </section>

</body>
</html>
